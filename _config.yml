# Build settings
theme: minima
markdown: kramdown
permalink: /:year/:month/:day/:title/

# Minima theme settings
minima:
  skin: classic
  date_format: "%Y.%m.%d"

# Show excerpts on the homepage
show_excerpts: false

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

